<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | ProjectAlpha</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <h2>Welcome Back</h2>
            <p class="subtitle">Please select your account type to continue</p>

            <div class="toggle-container">
                <button class="toggle-btn active" id="student-tab">Student</button>
                <button class="toggle-btn" id="company-tab">Company</button>
            </div>

            <form id="login-form">
                <div class="input-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="name@example.com" required>
                </div>
                
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn-login" id="submit-btn">Login as Student</button>
            </form>
            <div style="margin-top: 2rem; padding-top: 1rem; border-top: 1px solid #eee; font-size: 0.9rem; color: #6b7280;">
    Don't have an account? 
    <a href="signup.html" style="color: #3b82f6; text-decoration: none; font-weight: 600;">Create an Account</a>
</div>
            
            <p id="message" class="message"></p>
        </div>
    </div>
    <script src="login.js"></script>
</body>
</html>
